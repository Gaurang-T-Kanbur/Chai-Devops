name: Deploy Nodejs code on ExCloud

on:
  push:
    branches:
      - master

jobs:
  deploy:
      runs-on: ubuntu-latest


      steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Login to Docker Hub
          uses: docker/login-action@v4
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: QEMU
          uses: docker/setup-qemu-action@v4
      
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v4

        - name: Docker Build and Push
          run: 
            docker build -t gaurangkanbur/node-image .
            docker push gaurangkanbur/node-image



        - name: Deploy on ExCloud
          uses: appleboy/ssh-action@v1.0.3
          with: 
            host: 210.79.128.104
            username: ubuntu
            key: ${{ secrets.PRIVATE_KEY }}
            script: |
               sudo docker rm -f node-image || true

               # Again pull the fresh image from hub
                 sudo docker pull gaurangkanbur/node-image

               # Run container
                sudo docker run -d --name node-image --restart unless-stopped -p 80:8000 gaurangkanbur/node-image

               # Clean up old/unused images
                 sudo docker image prune -f

             